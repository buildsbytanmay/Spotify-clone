<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="leftBox1">
                <div class="logoClose">
                    <div class="logo"></div>
                    <div class="close">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="white" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="close-icon">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </div>
                </div>
                <div class="menus">
                    <ul>
                        <li>
                            <div class="icon home">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" data-encore-id="icon" role="img" aria-hidden="true" class="Svg-sc-ytk21e-0 iYxpxA home-active-icon" viewBox="0 0 24 24">
                                    <path d="M13.5 1.515a3 3 0 0 0-3 0L3 5.845a2 2 0 0 0-1 1.732V21a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-6h4v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V7.577a2 2 0 0 0-1-1.732l-7.5-4.33z"></path>
                                </svg>
                            </div>Home
                        </li>
                        <li>
                            <div class="icon search">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" data-encore-id="icon"role="img" aria-hidden="true" class="Svg-sc-ytk21e-0 iYxpxA search-icon"viewBox="0 0 24 24">
                                    <path d="M10.533 1.279c-5.18 0-9.407 4.14-9.407 9.279s4.226 9.279 9.407 9.279c2.234 0 4.29-.77 5.907-2.058l4.353 4.353a1 1 0 1 0 1.414-1.414l-4.344-4.344a9.157 9.157 0 0 0 2.077-5.816c0-5.14-4.226-9.28-9.407-9.28zm-7.407 9.279c0-4.006 3.302-7.28 7.407-7.28s7.407 3.274 7.407 7.28-3.302 7.279-7.407 7.279-7.407-3.273-7.407-7.28z"></path>
                                </svg>
                            </div>Search
                        </li>
                    </ul>
                </div>
            </div>
            <div class="leftBox2">
                <div class="library">
                    <div class="icon libraryIcon"></div>Your Library
                </div>
                <div class="libraryList">
                    <ul>
                        
                    </ul>
                </div>
            </div>
            <div class="leftBox3">
                <div class="footdata">
                    <ul>
                        <li>Legal</li>
                        <li>Safety & Privacy Center</li>
                        <li>Privacy Policy</li>
                        <li>Cookies</li>
                        <li>About Ads</li>
                        <li>Accessibility</li>
                    </ul>
                    <div class="left3"><a href="#">Cookies</a></div>
                </div>
                <button class="langButton">
                    <div class="internetIcon"></div>English
                </button>
            </div>
        </div>
        <div class="right">
            <nav>
                <div class="naviIcons">
                    <div class="hamburger chevron">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 5L20 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M4 12L20 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M4 19L20 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="leftChevron chevron">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-chevron-left" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0"/>
                        </svg>
                    </div>
                    <div class="rightChevron chevron">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-chevron-right" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708"/>
                        </svg>
                    </div>
                </div>
                <div class="signupButtons">
                    <button class="btn signbtn">Sign up</button>
                    <button class="btn logbtn">Log in</button>
                </div>
            </nav>
            <section>
                <div class="secHead"><h2>Spotify Playlists</h2></div>
                <div class="cardContainer"></div>
            </section>
            <div class="playBar">
                
                <div class="fullScreenHead" style="display: none;"></div>
                <div class="imagediv" style="display: none;"></div>

                <div class="upperBar">
                    <div class="songInfo"></div>

                    <div class="songButtons">
                        <div class="previous">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M20 19V5L8 12L20 19Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                                <path d="M4 4V20" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </div>
                        <div class="play">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M5 20V4L19 12L5 20Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <div class="next">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M4 19V5L16 12L4 19Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                                <path d="M20 4V20" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </div>
                    </div>

                    <div class="rangeAndTime">
                        <div class="range">
                            <div class="sound">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M13.9998 4H14.7498C14.7498 3.72564 14.6 3.47317 14.3592 3.34171C14.1183 3.21024 13.825 3.22076 13.5942 3.36913L13.9998 4ZM13.9998 20L13.5942 20.6309C13.825 20.7792 14.1183 20.7898 14.3592 20.6583C14.6 20.5268 14.7498 20.2744 14.7498 20H13.9998ZM2.00049 8.5V7.75C1.58627 7.75 1.25049 8.08579 1.25049 8.5H2.00049ZM2.00049 15.5H1.25049C1.25049 15.9142 1.58627 16.25 2.00049 16.25V15.5ZM7.00049 8.5V9.25H7.22078L7.40609 9.13087L7.00049 8.5ZM7.00049 15.5L7.40609 14.8691L7.22078 14.75H7.00049V15.5ZM13.2498 4V20H14.7498V4H13.2498ZM1.25049 8.5V15.5H2.75049V8.5H1.25049ZM2.00049 9.25H7.00049V7.75H2.00049V9.25ZM2.00049 16.25H7.00049V14.75H2.00049V16.25ZM7.40609 9.13087L14.4054 4.63087L13.5942 3.36913L6.59489 7.86913L7.40609 9.13087ZM6.59489 16.1309L13.5942 20.6309L14.4054 19.3691L7.40609 14.8691L6.59489 16.1309Z" fill="currentColor"/>
                                    <path d="M17 9C17.6254 9.81968 18 10.8634 18 12C18 13.1366 17.6254 14.1803 17 15" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                                    <path d="M20 7C21.2508 8.36613 22 10.1057 22 12C22 13.8943 21.2508 15.6339 20 17" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <input type="range">
                        </div>
                        <div class="songTime">00:00 / 00:00</div>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</body>
</html>
